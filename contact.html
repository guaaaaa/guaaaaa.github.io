<!DOCTYPE html>
<html>

<head>
	<link href="https://fonts.googleapis.com/css?family=Montserrat:100,300,400,500,700" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="contact.css"/>
    <title>Place</title>
</head>

<body>
	<div class="header">
		<div class="inner_header">
			<div class="logo_container">
				<a href="index.html"><h1>Travel<br><span>Canada</span></h1></a>
			</div>

			<div class="navigation">
				<a href="index.html"><li>Home</li></a>
				<a href="about.html"><li>About</li></a>
				<a href="place.html"><li>Place</li></a>
				<a href="contact.html"><li>Contact</li></a>
			</div>
		</div>
	</div>

	<div class="contact">
		<div class="main">
			<h1>Contact us</h1>
			<form class="contact_form" action="" method="post">
				<div class="border">
					<label for="name">Name :</label><br>
					<input type="text" name="name" placeholder="Fullname"><br>
				</div>
				<div class="border">
					<label>Email :</label><br>
					<input type="text" name="mail" placeholder="Email"><br>
				</div>
				<div class="border">
					<label>Phone Number :</label><br>
					<input type="text" name="phonenub" placeholder="Phone Number"><br>
				</div>
				<div class="border">
					<label>Subject :</label><br>
					<input type="text" name="subject" placeholder="Subject"><br>
				</div>
				<div class="border">
					<label>Message :</label><br>
					<textarea name="message" rows="8" cols="80" placeholder="Message"></textarea><br>
				</div>
				<button type="submit" name="submit">Send</button>
			</form>
		</div>
	</div>
</body>
